<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>El Padrino del Pretérito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Special+Elite&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        :root {
            --gold: #dfbd69;
            --bright-gold: #fcf6ba;
            --deep-gold: #926d15;
            --blood: #8a0000;
            --noir-black: #020202;
            --desk: #140b08;
            --folder-tan: #b8af9f; 
        }

        body {
            background-color: var(--noir-black);
            color: #e0e0e0;
            font-family: 'Playfair Display', serif;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at center, transparent 0%, rgba(0,0,0,1) 100%),
                url("https://www.transparenttextures.com/patterns/dark-leather.png");
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
        }

        /* Wide Ellipse Vignette - Fixed Clipping */
        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 65%, rgba(0,0,0,0.98) 100%);
            pointer-events: none;
            z-index: 100;
        }

        .film-grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 101;
            opacity: 0.1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .cinzel-header { font-family: 'Cinzel Decorative', serif; }
        .cinzel-sub { font-family: 'Cinzel', serif; }
        .typewriter { font-family: 'Special Elite', monospace; }

        .gold-metal {
            background: linear-gradient(to bottom, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,1));
            font-weight: 900;
        }

        .safe-pt { padding-top: env(safe-area-inset-top, 20px); }

        .desktop-frame {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            z-index: 10;
            position: relative;
        }

        /* Mafia Button - Resized for "Continue" fit */
        .btn-mafia {
            background: linear-gradient(180deg, #222 0%, #000 100%);
            border: 2px solid var(--deep-gold);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 15px 25px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,1);
            position: relative;
            overflow: hidden;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        @media (min-width: 768px) {
            .btn-mafia { padding: 25px 50px; letter-spacing: 4px; }
        }

        .btn-mafia:hover {
            transform: translateY(-5px);
            border-color: var(--bright-gold);
            box-shadow: 0 20px 50px rgba(0,0,0,1);
            filter: brightness(1.3);
        }

        .btn-mafia:active { transform: translateY(2px); background: var(--blood); color: white; }

        /* Dossier Style */
        .dossier-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1400px;
        }

        .dossier-folder {
            background-color: var(--folder-tan);
            color: #000;
            padding: 40px;
            border-left: 15px solid var(--blood);
            box-shadow: 15px 20px 60px rgba(0,0,0,1);
            position: relative;
            transform: rotate(-0.5deg);
            transition: all 0.4s ease;
        }

        .dossier-folder:hover { transform: rotate(0deg) translateY(-10px); z-index: 20; }

        .dossier-tab {
            position: absolute;
            top: -24px;
            left: 30px;
            background: var(--folder-tan);
            padding: 5px 25px;
            font-family: 'Special Elite', monospace;
            font-size: 11px;
            border-radius: 5px 5px 0 0;
            color: #000;
            font-weight: 900;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }

        .interrogation-input {
            background: rgba(0,0,0,0.98);
            border: none;
            border-bottom: 6px solid var(--blood);
            color: var(--gold);
            font-size: 2.5rem;
            text-align: center;
            font-family: 'Special Elite', monospace;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            outline: none;
        }

        @media (min-width: 768px) { .interrogation-input { font-size: 6rem; } }

        .blur-intel { filter: blur(22px); transition: filter 0.6s ease; user-select: none; pointer-events: none; }
        .revealed .blur-intel { filter: blur(0); }

        .correct-stamp {
            color: var(--blood);
            border: 6px solid var(--blood);
            padding: 10px 40px;
            font-family: 'Special Elite', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            transform: rotate(-25deg);
            opacity: 0.95;
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: none;
            animation: stampAnim 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes stampAnim { from { transform: scale(5) rotate(0deg); opacity: 0; } to { transform: scale(1) rotate(-25deg); opacity: 1; } }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--deep-gold); border: 3px solid #000; border-radius: 10px; }
    </style>
</head>

        {es: "fui", en: "I was / I went", alts: ["was", "went"], context: "Yo fui un amigo. / Yo fui al parque."},
        {es: "fuiste", en: "you were / you went", alts: ["were", "went"], context: "Tú fuiste mi mejor amigo. / Tú fuiste a Sicilia."},
        {es: "fue", en: "he was / he went", alts: ["was", "went", "she was", "it was"], context: "Él fue importante. / Él fue a Florida."},
        {es: "fuimos", en: "we were / we went", alts: ["were", "went"], context: "Nosotros fuimos amigos. / Nosotros fuimos a Cuba."},
        {es: "fueron", en: "they were / they went", alts: ["were", "went"], context: "Ellos fueron felices. / Ellos fueron a Sicilia."},
        {es: "vi", en: "I saw", alts: ["saw"]},
        {es: "viste", en: "you saw", alts: ["saw"]},
        {es: "vio", en: "he saw", alts: ["saw", "she saw", "it saw"]},
        {es: "vimos", en: "we saw", alts: ["saw"]},
        {es: "vieron", en: "they saw", alts: ["saw"]},
        {es: "hice", en: "I made / I did", alts: ["made", "did"]},
        {es: "hiciste", en: "you made", alts: ["made", "did"]},
        {es: "hizo", en: "he made", alts: ["made", "did", "she made", "it made"]},
        {es: "hicimos", en: "we made", alts: ["made", "did"]},
        {es: "hicieron", en: "they made", alts: ["made", "did"]},
        {es: "tuve", en: "I had", alts: ["had"]},
        {es: "tuviste", en: "you had", alts: ["had"]},
        {es: "tuvo", en: "he had", alts: ["had", "she had", "it had"]},
        {es: "tuvimos", en: "we had", alts: ["had"]},
        {es: "tuvieron", en: "they had", alts: ["had"]}
    ];

    const MODE3_DATA = {
        "vivir": ["viví", "viviste", "vivió", "vivimos", "vivieron"],
        "agarrar": ["agarré", "agarraste", "agarró", "agarramos", "agarraron"],
        "vomitar": ["vomité", "vomitaste", "vomitó", "vomitamos", "vomitaron"],
        "atacar": ["ataqué", "atacaste", "atacó", "atacamos", "atacaron"],
        "viajar": ["viajé", "viajaste", "viajó", "viajamos", "viajaron"],
        "comprar": ["compré", "compraste", "compró", "compramos", "compraron"],
        "llegar": ["llegué", "llegaste", "llegó", "llegamos", "llegaron"],
        "regresar": ["regresé", "regresaste", "regresó", "regresamos", "regresaron"],
        "ducharse": ["me duché", "te duchaste", "se duchó", "nos duchamos", "se ducharon"],
        "levantarse": ["me levanté", "te levantaste", "se levantó", "nos levantamos", "se levantaron"],
        "moverse": ["me moví", "te moviste", "se movió", "nos movimos", "se movieron"],
        "ser/ir": ["fui", "fuiste", "fue", "fuimos", "fueron"],
        "ver": ["vi", "viste", "vio", "vimos", "vieron"],
        "hacer": ["hice", "hiciste", "hizo", "hicimos", "hicieron"],
        "tener": ["tuve", "tuviste", "tuvo", "tuvimos", "tuvieron"]
    };

    let state = {
        currentView: 'home',
        settings: { mode1Filter: 'story', voiceName: 'PREMIUM_US', voiceRate: 0.8 },
        mode1: { queue: [], index: 0 },
        mode2: { queue: [], index: 0, score: 0, missed: [] },
        voices: []
    };

    window.onload = () => {
        loadSettings();
        initVoices();
        renderMode3();
        document.getElementById('mode2-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkMode2(); });
    };

    function initVoices() {
        const populate = () => {
            state.voices = window.speechSynthesis.getVoices();
            const select = document.getElementById('setting-voice');
            const targetNames = ["Google español de Estados Unidos", "Paulina", "Siri", "Monica", "Jorge", "Luciana"];
            const spanish = state.voices.filter(v => v.lang.toLowerCase().startsWith('es'));
            
            // Prefer Neural/Enhanced versions first to avoid robotic sound
            let best = spanish.find(v => targetNames.some(t => v.name.includes(t)) && !v.name.toLowerCase().includes("compact"));
            if (!best) best = spanish.find(v => targetNames.some(t => v.name.includes(t)));

            select.innerHTML = best ? `<option value="PREMIUM_US">🇺🇸 Intellectual Asset (Premium)</option>` : '<option value="">System Default</option>';
            
            spanish.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.name;
                const flag = v.lang.toLowerCase().includes('mx') ? "🇲🇽" : (v.lang.toLowerCase().includes('es') ? "🇪🇸" : "🌎");
                opt.textContent = `${flag} ${v.name}`;
                if (v.name === state.settings.voiceName) opt.selected = true;
                select.appendChild(opt);
            });
        };
        populate();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populate;
    }

    function changeView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
        document.getElementById(`view-${viewId}`).classList.remove('hidden');
        window.scrollTo(0,0);
        state.currentView = viewId;
        if (viewId === 'mode1') startMode1();
        if (viewId === 'mode2') startMode2();
    }

    function updateSettings() {
        state.settings.mode1Filter = document.getElementById('setting-mode1-filter').value;
        state.settings.voiceName = document.getElementById('setting-voice').value;
        state.settings.voiceRate = parseFloat(document.getElementById('setting-voice-rate').value);
        localStorage.setItem(`${APP_ID}-settings`, JSON.stringify(state.settings));
    }

    function loadSettings() {
        const saved = localStorage.getItem(`${APP_ID}-settings`);
        if (saved) {
            state.settings = JSON.parse(saved);
            document.getElementById('setting-mode1-filter').value = state.settings.mode1Filter || 'story';
            document.getElementById('setting-voice-rate').value = state.settings.voiceRate || 0.8;
        }
    }

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'es-MX';
        msg.rate = state.settings.voiceRate || 0.8;
        const vs = state.settings.voiceName;
        if (vs === "PREMIUM_US" || !vs) {
            const targets = ["Google español de Estados Unidos", "Paulina", "Siri", "Monica"];
            const target = state.voices.find(v => targets.some(t => v.name.includes(t)) && !v.name.toLowerCase().includes("compact")) || 
                           state.voices.find(v => targets.some(t => v.name.includes(t))) || 
                           state.voices.find(v => v.lang.startsWith('es'));
            if (target) msg.voice = target;
        } else {
            const v = state.voices.find(v => v.name === vs);
            if (v) msg.voice = v;
        }
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(msg);
    }

    // MODE 1
    function startMode1() {
        const f = state.settings.mode1Filter;
        let pool = f === 'story' ? MODE1_DATA.filter(d => d.story) : MODE1_DATA;
        state.mode1.queue = [...pool].sort(() => Math.random() - 0.5).slice(0, 10);
        state.mode1.index = 0;
        showMode1();
    }

    function showMode1() {
        const item = state.mode1.queue[state.mode1.index];
        const enEl = document.getElementById('mode1-en');
        const esEl = document.getElementById('mode1-es');
        
        // PHYSICAL WIPE to prevent premature reveal
        enEl.innerHTML = "";
        enEl.classList.add('hidden');
        enEl.classList.add('opacity-0');
        
        esEl.textContent = item.es;
        esEl.classList.add('hidden');
        
        document.getElementById('mode1-progress').textContent = `INTERCEPT ${state.mode1.index + 1} / 10`;
        document.getElementById('btn-reveal').classList.remove('hidden');
        setTimeout(() => speak(item.es), 600);
    }

    function revealMode1() {
        const item = state.mode1.queue[state.mode1.index];
        const enEl = document.getElementById('mode1-en');
        const esEl = document.getElementById('mode1-es');
        enEl.textContent = item.en;
        enEl.classList.remove('hidden');
        esEl.classList.remove('hidden');
        setTimeout(() => enEl.classList.remove('opacity-0'), 50);
        document.getElementById('btn-reveal').classList.add('hidden');
    }

    function nextMode1() {
        if (state.mode1.index < 9) { state.mode1.index++; showMode1(); }
        else showSummary(10, 10, []);
    }

    function speakCurrentSentence() { speak(state.mode1.queue[state.mode1.index].es); }

    // MODE 2
    function startMode2() {
        state.mode2.queue = [...MODE2_DATA].sort(() => Math.random() - 0.5).slice(0, 15);
        state.mode2.index = 0; state.mode2.score = 0; state.mode2.missed = [];
        showMode2();
    }

    function showMode2() {
        const item = state.mode2.queue[state.mode2.index];
        document.getElementById('mode2-progress').textContent = `SUBJECT ${state.mode2.index + 1} / 15`;
        document.getElementById('mode2-target').textContent = item.es;
        document.getElementById('mode2-context').textContent = item.context || "Extract the interpretation.";
        document.getElementById('mode2-input').value = "";
        document.getElementById('mode2-feedback').innerHTML = "";
        document.getElementById('mode2-input').focus();
        document.getElementById('btn-submit-mode2').textContent = "CONFIRM INTEL";
    }

    function checkMode2() {
        const btn = document.getElementById('btn-submit-mode2');
        if (btn.textContent === "NEXT SUBJECT") { goToNextMode2(); return; }
        const item = state.mode2.queue[state.mode2.index];
        const raw = document.getElementById('mode2-input').value;
        const input = raw.toLowerCase().trim().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g, "");
        const answers = [item.en, ...item.alts].map(a => a.toLowerCase().trim().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g, ""));
        const isCorrect = answers.some(ans => input === ans || input === ans.replace(/^(i|you|he|she|it|we|they|you all) /g, ""));
        const fb = document.getElementById('mode2-feedback');
        
        if (isCorrect) {
            state.mode2.score++;
            fb.innerHTML = '<span class="stamp-approve">VERIFIED</span>';
        } else {
            state.mode2.missed.push({es: item.es, en: item.en});
            fb.innerHTML = `<span class="typewriter text-red-600 line-through text-2xl md:text-5xl mr-10 decoration-red-950 decoration-8">${raw || 'SILENCE'}</span> <span class="gold-metal text-3xl md:text-7xl">${item.en.toUpperCase()}</span>`;
        }
        btn.textContent = "NEXT SUBJECT";
    }

    function goToNextMode2() {
        if (state.mode2.index < 14) { state.mode2.index++; showMode2(); }
        else showSummary(state.mode2.score, 15, state.mode2.missed);
    }

    // MODE 3
    function renderMode3() {
        const list = document.getElementById('mode3-list');
        list.innerHTML = '';
        Object.keys(MODE3_DATA).forEach((verb, idx) => {
            const card = document.createElement('div');
            card.className = 'dossier-folder';
            const meaning = VERB_DEFS[verb] || "REDACTED";
            card.innerHTML = `
                <div class="dossier-tab">RECORDS FILE #${9000+idx}</div>
                <div class="border-b-8 border-black/20 pb-4 mb-10 flex justify-between items-end">
                    <span class="text-4xl md:text-6xl font-black cinzel tracking-tighter uppercase">${verb}</span>
                    <button onclick="revealDef(this, '${meaning}')" class="typewriter text-xs font-black border-2 border-black px-4 py-1 hover:bg-black hover:text-white transition-colors">REVEAL DEFINITION</button>
                </div>
                <div class="grid grid-cols-1 gap-6">
                    ${["yo", "tú", "él / ella / ud.", "nosotros", "ellos / ellas / uds."].map((p, i) => `
                        <div onclick="toggleBlur(this)" class="flex justify-between items-center bg-black/5 p-6 border-b-2 border-black/20 hover:bg-black/10 transition-colors cursor-pointer group">
                            <div class="typewriter text-sm md:text-xl font-black opacity-100 uppercase tracking-tighter text-black">${p}</div>
                            <div class="text-2xl md:text-5xl font-black blur-intel text-black">
                                ${MODE3_DATA[verb][i]}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            list.appendChild(card);
        });
    }

    function revealDef(btn, text) { 
        btn.textContent = text.toUpperCase(); 
        btn.classList.add('bg-blood', 'text-white', 'border-blood'); 
    }

    function toggleBlur(el) { 
        el.classList.toggle('revealed'); 
    }

    function showSummary(score, total, missed) {
        changeView('summary');
        document.getElementById('summary-score').textContent = `${score}/${total}`;
        const container = document.getElementById('missed-container');
        const list = document.getElementById('missed-list');
        if (missed.length > 0) {
            container.classList.remove('hidden');
            list.innerHTML = missed.map(m => `<div>• <span class="font-bold underline decoration-red-950 decoration-4 md:decoration-8">${m.es}</span> <span class="opacity-50">is</span> <span class="font-bold">${m.en}</span></div>`).join('');
        } else {
            container.classList.add('hidden');
        }
    }
</script>

</body>
